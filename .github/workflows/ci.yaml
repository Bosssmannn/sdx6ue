# ============================================================================
# Recipe API — CI/CD Pipeline
# ============================================================================
# This pipeline implements: Lint → Build → Security Scan → Integration Test → Push
# Supply-chain hardening: SHA-pinned actions, least-privilege permissions,
# SBOM generation, Trivy --exit-code, and fork protection via environment.
# ============================================================================

name: Recipe API CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ── Top-level: drop every permission by default (Pipeline Hardening) ────────
permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/recipe-api

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # 1. LINT — Check source code and Dockerfile for errors/warnings
  # ════════════════════════════════════════════════════════════════════════════
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read  # only needs to read the repo
    steps:
      # SHA-pinned: actions/checkout v4.2.2
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # ── Go source linting with golangci-lint ──
      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.24"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: latest
          working-directory: ./exercise/ex_01/src

      # ── Dockerfile linting with Hadolint ──
      - name: Lint Dockerfile with Hadolint
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: exercise/ex_01/Dockerfile

  # ════════════════════════════════════════════════════════════════════════════
  # 2. BUILD — Multi-platform Docker image (amd64 + arm64)
  # ════════════════════════════════════════════════════════════════════════════
  build:
    name: Build
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # needed to push to GHCR later (shared login)
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and export multi-platform image
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198e19c816612b # v6.18.0
        with:
          context: ./exercise/ex_01
          file: ./exercise/ex_01/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          load: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Build a single-platform image and export for later jobs ──
      - name: Build single-platform image for scanning/testing
        uses: docker/build-push-action@263435318d21b8e681c14492fe198e19c816612b # v6.18.0
        with:
          context: ./exercise/ex_01
          file: ./exercise/ex_01/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: recipe-api:ci
          cache-from: type=gha

      - name: Save image as tarball
        run: docker save recipe-api:ci -o /tmp/recipe-api.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@ea165f8d65b6db9b8a1f7c064bc2f1c2c88658e7 # v4.6.2
        with:
          name: docker-image
          path: /tmp/recipe-api.tar
          retention-days: 1

  # ════════════════════════════════════════════════════════════════════════════
  # 3. SECURITY SCAN — Trivy vulnerability scan + SBOM generation
  # ════════════════════════════════════════════════════════════════════════════
  security-scan:
    name: Security Scan
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # upload SARIF to GitHub Security tab
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/recipe-api.tar

      # ── Trivy scan with --exit-code 1 to FAIL on HIGH/CRITICAL (Hardening) ──
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@76071ef0d7ec797419534a183b498b4d6366cf37 # v0.31.0
        with:
          image-ref: recipe-api:ci
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Run Trivy scanner (SARIF for GitHub Security)
        if: always()
        uses: aquasecurity/trivy-action@76071ef0d7ec797419534a183b498b4d6366cf37 # v0.31.0
        with:
          image-ref: recipe-api:ci
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3.28.18
        with:
          sarif_file: trivy-results.sarif

      # ── SBOM generation (Pipeline Hardening) ──
      - name: Generate SBOM with Trivy
        uses: aquasecurity/trivy-action@76071ef0d7ec797419534a183b498b4d6366cf37 # v0.31.0
        with:
          image-ref: recipe-api:ci
          format: cyclonedx
          output: sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6db9b8a1f7c064bc2f1c2c88658e7 # v4.6.2
        with:
          name: sbom
          path: sbom.cdx.json
          retention-days: 90

  # ════════════════════════════════════════════════════════════════════════════
  # 4. INTEGRATION TEST — Start app + database, run API tests
  # ════════════════════════════════════════════════════════════════════════════
  integration-test:
    name: Integration Test
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download image artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/recipe-api.tar

      - name: Tag image for compose
        run: |
          # Tag the CI image so docker-compose can reference it
          docker tag recipe-api:ci recipe-api:latest

      - name: Start services with Docker Compose
        working-directory: ./exercise/ex_01
        run: |
          # Override the build directive to use our pre-built image
          cat > docker-compose.ci.yaml <<'EOF'
          services:
            app:
              image: recipe-api:latest
              ports:
                - "8080:8080"
              environment:
                - DB_HOST=db
                - DB_PORT=5432
                - DB_USER=recipe_user
                - DB_PASSWORD=ci_test_password
                - DB_NAME=recipe_db
              depends_on:
                db:
                  condition: service_healthy

            db:
              image: postgres:14.1-alpine
              restart: always
              environment:
                POSTGRES_USER: recipe_user
                POSTGRES_PASSWORD: ci_test_password
                POSTGRES_DB: recipe_db
              ports:
                - "5432:5432"
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U recipe_user -d recipe_db"]
                interval: 5s
                timeout: 5s
                retries: 5
          EOF
          docker compose -f docker-compose.ci.yaml up -d

      - name: Wait for services to be ready
        run: |
          echo "Waiting for API to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "API is healthy!"
              exit 0
            fi
            echo "Attempt $i/30 — waiting 2s..."
            sleep 2
          done
          echo "ERROR: API did not become healthy in time"
          docker compose -f exercise/ex_01/docker-compose.ci.yaml logs
          exit 1

      - name: Run API integration tests
        run: |
          set -euo pipefail
          API="http://localhost:8080"
          PASS=0
          FAIL=0

          assert_status() {
            local description="$1" expected="$2" actual="$3"
            if [ "$expected" = "$actual" ]; then
              echo "  ✅ $description (HTTP $actual)"
              PASS=$((PASS + 1))
            else
              echo "  ❌ $description — expected $expected, got $actual"
              FAIL=$((FAIL + 1))
            fi
          }

          echo "═══ Test: Root endpoint ═══"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API/")
          assert_status "GET / returns 200" "200" "$STATUS"

          echo "═══ Test: Health check ═══"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API/health")
          assert_status "GET /health returns 200" "200" "$STATUS"

          echo "═══ Test: List recipes (empty) ═══"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API/recipes")
          assert_status "GET /recipes returns 200" "200" "$STATUS"

          echo "═══ Test: Create a recipe ═══"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$API/recipes" \
            -H "Content-Type: application/json" \
            -d '{"name":"Wiener Schnitzel","description":"Classic breaded veal cutlet","ingredients":["veal","breadcrumbs","egg","flour","lemon"]}')
          STATUS=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          assert_status "POST /recipes returns 200" "200" "$STATUS"

          # Extract the ID of the created recipe
          RECIPE_ID=$(echo "$BODY" | grep -o '"ID":[0-9]*' | head -1 | cut -d: -f2)
          if [ -z "$RECIPE_ID" ]; then
            echo "  ⚠️  Could not extract recipe ID, trying lowercase..."
            RECIPE_ID=$(echo "$BODY" | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
          fi
          echo "  Created recipe ID: $RECIPE_ID"

          echo "═══ Test: Get recipe by ID ═══"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API/recipes/$RECIPE_ID")
          assert_status "GET /recipes/$RECIPE_ID returns 200" "200" "$STATUS"

          echo "═══ Test: Update recipe ═══"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X PUT "$API/recipes/$RECIPE_ID" \
            -H "Content-Type: application/json" \
            -d '{"name":"Wiener Schnitzel (Updated)","description":"With parsley potatoes","ingredients":["veal","breadcrumbs","egg","flour","lemon","parsley","potatoes"]}')
          assert_status "PUT /recipes/$RECIPE_ID returns 200" "200" "$STATUS"

          echo "═══ Test: Delete recipe ═══"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE "$API/recipes/$RECIPE_ID")
          assert_status "DELETE /recipes/$RECIPE_ID returns 204" "204" "$STATUS"

          echo "═══ Test: Get deleted recipe (should 404) ═══"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API/recipes/$RECIPE_ID")
          assert_status "GET deleted recipe returns 404" "404" "$STATUS"

          echo "═══ Test: Easter eggs ═══"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API/brew")
          assert_status "GET /brew returns 418 (teapot)" "418" "$STATUS"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API/chef")
          assert_status "GET /chef returns 200" "200" "$STATUS"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API/fortune")
          assert_status "GET /fortune returns 200" "200" "$STATUS"

          echo ""
          echo "════════════════════════════════════"
          echo "  Results: $PASS passed, $FAIL failed"
          echo "════════════════════════════════════"
          [ "$FAIL" -eq 0 ] || exit 1

      - name: Dump logs on failure
        if: failure()
        working-directory: ./exercise/ex_01
        run: docker compose -f docker-compose.ci.yaml logs

      - name: Tear down services
        if: always()
        working-directory: ./exercise/ex_01
        run: docker compose -f docker-compose.ci.yaml down -v

  # ════════════════════════════════════════════════════════════════════════════
  # 5. PUSH — Push to registry with commit SHA tag (protected by environment)
  # ════════════════════════════════════════════════════════════════════════════
  push:
    name: Push to Registry
    needs: [security-scan, integration-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # ── Fork protection: require "production" environment approval (Hardening) ──
    environment: production
    permissions:
      contents: read
      packages: write      # push images to GHCR
      id-token: write      # needed for cosign keyless signing
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push multi-platform image
        id: push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198e19c816612b # v6.18.0
        with:
          context: ./exercise/ex_01
          file: ./exercise/ex_01/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Image signing with cosign (Pipeline Hardening — SLSA provenance) ──
      - name: Install cosign
        uses: sigstore/cosign-installer@3454372be43b8f1b73e0f6e20f04730b4e1d4e2d # v3.8.2

      - name: Sign the container image
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: "true"
