# ============================================================================
# Recipe API — CI/CD Pipeline
# ============================================================================
# Security Fix: Updated Go version to 1.26.1 to address CVE-2026-25679.
# ============================================================================

name: Recipe API CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/recipe-api

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # 1. LINT — Updated Go version to clear CVE-2026-25679
  # ════════════════════════════════════════════════════════════════════════════
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # FIXED: Version bumped to 1.26.1 to resolve CVE-2026-25679
          go-version: "1.26.1"
          cache: true
          cache-dependency-path: ./exercise/ex_01/src/go.sum

      # CRITICAL FIX: Ensure go.mod is aligned with the runner's Go version
      - name: Tidy Dependencies
        working-directory: ./exercise/ex_01/src
        run: |
          go mod edit -go=1.26
          go mod tidy

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ./exercise/ex_01/src
          # Added timeout to prevent runner kills during deep scans
          args: --timeout=5m

      - name: Lint Dockerfile with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: exercise/ex_01/Dockerfile

  # ════════════════════════════════════════════════════════════════════════════
  # 2. BUILD — Multi-platform Docker image
  # ════════════════════════════════════════════════════════════════════════════
  build:
    name: Build
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and export multi-platform image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./exercise/ex_01
          file: ./exercise/ex_01/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          load: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build single-platform image for scanning/testing
        uses: docker/build-push-action@v6
        with:
          context: ./exercise/ex_01
          file: ./exercise/ex_01/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: recipe-api:ci
          cache-from: type=gha

      - name: Save image as tarball
        run: docker save recipe-api:ci -o /tmp/recipe-api.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/recipe-api.tar
          retention-days: 1
